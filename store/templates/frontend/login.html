<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriPet - Premium Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 24%),
                        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.14), transparent 22%),
                        #050816;
            color: #e2e8f0;
            overflow: hidden;
        }

        .glow-ring {
            position: fixed;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.55;
            z-index: -2;
        }

        .glow-ring.one {
            top: -120px;
            left: -100px;
            background: rgba(56, 189, 248, 0.24);
        }

        .glow-ring.two {
            bottom: -140px;
            right: -90px;
            background: rgba(59, 130, 246, 0.16);
        }

        .login-container {
            width: 100%;
            max-width: 520px;
            z-index: 1;
        }

        .login-card {
            position: relative;
            overflow: hidden;
            background: rgba(9, 18, 35, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 34px;
            padding: 3rem 2.5rem;
            box-shadow: 0 32px 90px rgba(0, 0, 0, 0.38);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            animation: appear 0.55s ease-out;
        }

        .login-card::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0));
            opacity: 0.35;
        }

        .login-card::after {
            content: '';
            position: absolute;
            top: -120px;
            right: -120px;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.18), transparent 55%);
            filter: blur(16px);
        }

        @keyframes appear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-section {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .brand-icon {
            width: 82px;
            height: 82px;
            border-radius: 24px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 18px 45px rgba(14, 165, 233, 0.12);
            color: #7dd3fc;
            font-size: 2rem;
        }

        .brand-text {
            color: #f8fafc;
            font-size: clamp(2rem, 3vw, 2.7rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.02;
        }

        .brand-subtitle {
            color: rgba(226, 232, 240, 0.66);
            font-size: 1rem;
            max-width: 88%;
            line-height: 1.7;
        }

        .message-alert {
            position: relative;
            z-index: 1;
            margin-bottom: 1.5rem;
            padding: 1rem 1.2rem;
            border-radius: 18px;
            border: 1px solid rgba(56, 189, 248, 0.24);
            background: rgba(56, 189, 248, 0.12);
            color: #dbeafe;
            font-weight: 500;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
        }

        .message-alert.error {
            background: rgba(248, 113, 113, 0.12);
            border-color: rgba(248, 113, 113, 0.26);
            color: #fee2e2;
        }

        .login-form {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .input-group {
            position: relative;
            animation: fadeIn 0.55s ease-out forwards;
        }

        .input-group:nth-child(1) { animation-delay: 0.1s; }
        .input-group:nth-child(2) { animation-delay: 0.18s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(226, 232, 240, 0.55);
            font-size: 1.05rem;
            transition: color 0.25s ease;
            pointer-events: none;
        }

        .input-group:focus-within .input-icon {
            color: #7dd3fc;
        }

        .form-control {
            width: 100%;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(15, 23, 42, 0.85);
            color: #f8fafc;
            font-size: 1rem;
            padding: 1rem 1rem 1rem 3.8rem;
            transition: all 0.25s ease;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.05);
            backdrop-filter: blur(14px);
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.36);
        }

        .form-control:hover,
        .form-control:focus {
            background: rgba(255,255,255,0.1);
            border-color: rgba(59, 130, 246, 0.45);
        }

        .form-control:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            color: rgba(226, 232, 240, 0.7);
            font-size: 0.95rem;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            cursor: pointer;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #38bdf8;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.05);
        }

        .forgot-password {
            color: #7dd3fc;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.25s ease;
        }

        .forgot-password:hover {
            color: #38bdf8;
        }

        .btn-signin {
            width: 100%;
            padding: 1.1rem 1.5rem;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 18px 50px rgba(14, 165, 233, 0.25);
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 24px 55px rgba(14, 165, 233, 0.32);
        }

        .btn-signin:active {
            transform: translateY(0);
        }

        .signup-link {
            text-align: center;
            margin-top: 1.6rem;
            color: rgba(226, 232, 240, 0.7);
            font-size: 0.95rem;
        }

        .signup-link a {
            color: #7dd3fc;
            font-weight: 700;
            text-decoration: none;
        }

        .signup-link a:hover {
            color: #38bdf8;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .login-card {
                padding: 2rem 1.5rem;
                border-radius: 28px;
            }

            .brand-text {
                font-size: 2rem;
            }

            .form-control {
                padding: 0.95rem 1rem 0.95rem 3.4rem;
            }

            .input-icon {
                left: 1rem;
            }

            .brand-subtitle {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="glow-ring one"></div>
    <div class="glow-ring two"></div>
    <div class="login-container">
        <div class="login-card">
            <div class="brand-section">
                <div class="brand-icon">
                    <i class="fas fa-paw"></i>
                </div>
                <div class="brand-text">Welcome Back</div>
                <div class="brand-subtitle">Log in to view your stores and manage inventory with premium analytics.</div>
            </div>

            {% if messages %}
            <div class="message-alert {% for message in messages %}{% if message.tags %}{{ message.tags }}{% endif %}{% endfor %}">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
            {% endif %}

            <form class="login-form" method="post" action="{% url 'store:frontend_login' %}">
                {% csrf_token %}
                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" name="username" placeholder="Enter your email address" required>
                </div>

                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
                </div>

                <div class="checkbox-group">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn-signin">
                    <i class="fas fa-arrow-right-to-bracket" style="margin-right: 0.75rem;"></i>
                    Sign In
                </button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="{% url 'store:register' %}">Sign up</a>
            </div>
        </div>
    </div>
</body>
</html>
