<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriPet - Premium Dashboard Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 25%, #0f1419 50%, #1a1f2e 75%, #0f172a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: -2;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animated background blobs */
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(41, 98, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-50px, -50px); }
            50% { transform: translate(0, -100px); }
            75% { transform: translate(50px, -50px); }
        }

        /* Additional decorative blob */
        .blob-2 {
            position: fixed;
            bottom: -20%;
            left: -5%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 212, 170, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float-reverse 25s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes float-reverse {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(50px, 50px); }
            50% { transform: translate(0, 100px); }
            75% { transform: translate(-50px, 50px); }
        }

        .login-container {
            width: 100%;
            max-width: 500px;
            z-index: 10;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 2.5rem;
            gap: 1rem;
        }

        .brand-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(41, 98, 255, 0.2) 0%, rgba(0, 212, 170, 0.2) 100%);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #7dd3fc;
            box-shadow: 0 8px 16px rgba(41, 98, 255, 0.1);
            animation: iconFloat 3s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .brand-text {
            color: #e2e8f0;
            font-size: clamp(1.8rem, 4vw, 2.2rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            margin: 0;
        }

        .brand-subtitle {
            color: rgba(226, 232, 240, 0.6);
            font-size: clamp(0.9rem, 2vw, 0.95rem);
            font-weight: 500;
            letter-spacing: 0.02em;
            margin: 0;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .input-group {
            position: relative;
            animation: fadeIn 0.6s ease-out forwards;
        }

        .input-group:nth-child(1) { animation-delay: 0.1s; }
        .input-group:nth-child(2) { animation-delay: 0.2s; }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.1rem;
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .input-group:focus-within .input-icon {
            color: #7dd3fc;
        }

        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 1rem 1rem 1rem 3.5rem;
            font-size: 1rem;
            color: #e2e8f0;
            transition: all 0.3s ease;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-control:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.18);
        }

        .form-control:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(125, 211, 252, 0.5);
            box-shadow: 
                0 0 0 3px rgba(41, 98, 255, 0.1),
                inset 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: rgba(226, 232, 240, 0.7);
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2962ff;
        }

        .forgot-password {
            color: #7dd3fc;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #06b6d4;
            text-decoration: underline;
        }

        .btn-signin {
            width: 100%;
            padding: 1.1rem 1.5rem;
            background: linear-gradient(135deg, #2962ff 0%, #00c4ff 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(41, 98, 255, 0.25);
            margin-top: 1rem;
            font-family: inherit;
            animation: fadeIn 0.6s ease-out 0.3s forwards;
            opacity: 0;
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(41, 98, 255, 0.35);
            filter: brightness(1.08);
        }

        .btn-signin:active {
            transform: translateY(0);
        }

        .signup-link {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(226, 232, 240, 0.7);
            font-size: 0.95rem;
            animation: fadeIn 0.6s ease-out 0.4s forwards;
            opacity: 0;
        }

        .signup-link a {
            color: #7dd3fc;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: #06b6d4;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .login-card {
                padding: 2rem 1.5rem;
            }

            .brand-section {
                margin-bottom: 2rem;
                gap: 0.75rem;
            }

            .brand-icon {
                width: 64px;
                height: 64px;
                font-size: 2rem;
            }

            .form-control {
                padding: 0.875rem 1rem 0.875rem 3rem;
                font-size: 0.95rem;
            }

            .input-icon {
                left: 1rem;
                font-size: 1rem;
            }

            .btn-signin {
                padding: 0.95rem 1.25rem;
                font-size: 0.95rem;
            }

            .checkbox-group {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .signup-link {
                margin-top: 1.5rem;
                padding-top: 1rem;
            }
        }

        /* Glassmorphism enhancement */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
            border-radius: 24px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="blob-2"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="brand-section">
                <div class="brand-icon">
                    <i class="fas fa-paw"></i>
                </div>
                <div class="brand-text">Welcome Back</div>
                <div class="brand-subtitle">Sign in to your AgriPet account</div>
            </div>

            <form class="login-form" method="post" action="{% url 'store:frontend_login' %}">
                {% csrf_token %}
                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" name="username" placeholder="Email or Username" required>
                </div>

                <div class="input-group">
                    <span class="input-icon"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="Password" required>
                </div>

                <div class="checkbox-group">
                    <label class="checkbox-wrapper">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn-signin">
                    <i class="fas fa-sign-in-alt" style="margin-right: 0.5rem;"></i>
                    Sign In to Dashboard
                </button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="{% url 'store:register' %}">Create one now</a>
            </div>
        </div>
    </div>
</body>
</html>
